spring.application.name=app
server.port=8080

# Datasource - vem 100% por env var no CAE
# As variáveis abaixo são injetadas pelo CAE (categoria RDS) e a URL JDBC
# é montada a partir delas. Todas obrigatórias - app falha no startup se faltar.
spring.datasource.url=jdbc:postgresql://${RDS_ADDRESS}:${RDS_PORT}/${RDS_DB_NAME}
spring.datasource.username=${RDS_USER_NAME}
spring.datasource.password=${RDS_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway sobe as migrations automaticamente no primeiro start
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# CORS - lista separada por virgula. No CAE com ELB unico, frontend e backend
# compartilham origem, entao CORS basicamente nao dispara. Mas mantemos pra dev.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# S3 OPCIONAL: so cria o bean se s3.enabled=true. Pra POC no CAE deixe false.
s3.enabled=${S3_ENABLED:false}
aws.accesskey=${AWS_ACCESS_KEY:}
aws.secretkey=${AWS_SECRET_KEY:}
aws.region=${AWS_REGION:us-east-1}

# Actuator pra observabilidade. /actuator/health pode ser usado tambem como healthcheck.
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=never
