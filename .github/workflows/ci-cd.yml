name: CI-CD-CAE
 
on:
  pull_request:
  push:
    branches: ["main"]
  merge_group:
    types: checks_requested
  # workflow_dispatch permite voce disparar manualmente pela UI do GitHub.
  # Util pra forcar um build sem precisar abrir PR/merge.
  workflow_dispatch:
    inputs:
      force_build_images:
        description: 'Forcar build das imagens mesmo sem merge_group'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
 
jobs:
 
  # 1. Detecta mudanca em diretorios (igual antes)
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      java: ${{ steps.filter.outputs.java }}
      front: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            java:
              - 'backend/sistema-java/app/**'
            frontend:
              - 'frontend/**'
 
 
  # 2. CI Java (build + test)
  java:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.java == 'true'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: eleicoes_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - name: Build + Test Java
        working-directory: 'backend/sistema-java/app/'
        env:
          # Variaveis padronizadas com o application.properties atual.
          # Sao quebradas em RDS_ADDRESS/PORT/DB_NAME pra montar a JDBC URL.
          RDS_ADDRESS: localhost
          RDS_PORT: 5432
          RDS_DB_NAME: eleicoes_db
          RDS_USER_NAME: postgres
          RDS_PASSWORD: postgres
          S3_ENABLED: false
        run: mvn clean install
 
 
  # 3. Prepara tag de versao (igual antes, mas agora roda em mais triggers)
  prepare:
    runs-on: ubuntu-latest
    if: github.event_name == 'merge_group' || github.event_name == 'workflow_dispatch'
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
    steps:
      - id: vars
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
 
 
  # 4. Build da imagem Java
  build-java-image:
    runs-on: ubuntu-latest
    needs: [prepare, detect-changes]
    # Roda quando: merge_group OU dispatch manual com flag ligada
    if: |
      (github.event_name == 'merge_group') ||
      (github.event_name == 'workflow_dispatch' && inputs.force_build_images == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Build da Imagem Java
        run: |
          sudo docker build \
            -t swr.sa-brazil-1.myhuaweicloud.com/experimental/system-eleic:${{ needs.prepare.outputs.tag }} \
            -t swr.sa-brazil-1.myhuaweicloud.com/experimental/system-eleic:latest \
            "./backend/sistema-java/app"
            
      - name: Login SWR
        run: | 
         sudo docker login -u sa-brazil-1@HST3U6VQ3721JJ0SFDXK -p 1777bcfbcefa938a6e5c0e05a38a624dc35c22cb4b7dc40e7d78bf90dc3db53c swr.sa-brazil-1.myhuaweicloud.com
 
      - name: Push Image
        run: |
          sudo docker push swr.sa-brazil-1.myhuaweicloud.com/experimental/system-eleic:latest
 
 
  # 5. Build da imagem Frontend
  # NAO precisa build-arg de URL do backend: a descoberta acontece em runtime
  # via API Route que le process.env.BACKEND_URL. Imagem totalmente desacoplada.
  build-front-image:
    runs-on: ubuntu-latest
    needs: [prepare, detect-changes]
    # Roda quando: merge_group OU dispatch manual com flag ligada
    if: |
      (github.event_name == 'merge_group') ||
      (github.event_name == 'workflow_dispatch' && inputs.force_build_images == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Build da Imagem Frontend
        run: |
          sudo docker build \
            -t swr.sa-brazil-1.myhuaweicloud.com/experimental/front:${{ needs.prepare.outputs.tag }} \
            -t swr.sa-brazil-1.myhuaweicloud.com/experimental/front:latest \
            "./frontend"
            
      - name: Login SWR
        run: | 
         sudo docker login -u sa-brazil-1@HST3U6VQ3721JJ0SFDXK -p 1777bcfbcefa938a6e5c0e05a38a624dc35c22cb4b7dc40e7d78bf90dc3db53c swr.sa-brazil-1.myhuaweicloud.com
 
      - name: Push Image
        run: |
          sudo docker push swr.sa-brazil-1.myhuaweicloud.com/experimental/front:latest
